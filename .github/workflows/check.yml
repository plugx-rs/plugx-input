name: Check

on:
  push:
    tags-ignore:
      - "*.*.*"
    branches-ignore:
      - "documentation"
  pull_request:
    branches:
      - "master"

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Installing Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Checking out sources
        uses: actions/checkout@v1
      - name: Check style
        run: cargo fmt --check
      - name: Build
        run: cargo build
      - name: Build (serde)
        run: cargo build --features=serde
      - name: Build (rkyv)
        run: cargo build --features=rkyv
      - name: Test current source
        run: cargo test --features serde,rkyv
      - name: Clippy
        run: cargo clippy --features serde,rkyv --no-deps
